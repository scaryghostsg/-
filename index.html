<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بطاقة معلمة</title>
<style>
  body {
    background: #f5f7fa;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: "Tajawal", Arial, sans-serif;
  }
  .card {
    width: 350px;
    height: 200px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    padding: 25px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .name {
    font-size: 25px;
    font-weight: 700;
    color: #1a1a1a;
  }
  .job {
    font-size: 25px;
    color: #6b7280;
    margin-top: 4px;
  }
  .info {
    font-size: 25px;
    color: #4b5563;
    line-height: 1.8;
  }
  .accent {
    height: 4px;
    width: 50px;
    background: #4f46e5;
    border-radius: 2px;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div class="card">
  <div>
    <div class="name">ندى نادر</div>
    <div class="job">المادة : الرياضيات</div>
    <div class="accent"></div>
  </div>
  
  <div class="info">
    📞 +966 54 773 0140 <br> 
          ✉️nadazafon191@gmail.com<br>
  
  </div>
</div>

</body>
</html>
